---
# Example inventory — replace hostnames and ansible_host with your RHEL targets.
# For local overrides without editing this file, use inventory/hosts.local.yml (gitignored).

all:
  children:
    sbom_scan_nodes:
      hosts:
        scan_node:
          ansible_host: scan-node.example.com
      vars:
        ansible_user: ansible
    rhel_hosts:
      hosts:
        rhel1:
          ansible_host: rhel1.example.com
      vars:
        ansible_user: ansible
