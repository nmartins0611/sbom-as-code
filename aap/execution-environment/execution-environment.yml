---
version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--pre'

options:
  package_manager_path: /usr/bin/microdnf

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest

dependencies:
  galaxy:
    collections:
      - name: ansible.posix
      - name: community.general

additional_build_steps:
  prepend_galaxy:
    - COPY _build/collections/ /usr/share/ansible/collections/
  prepend_final:
    - ENV SYFT_VERSION=1.45.1
    - ENV GRYPE_VERSION=0.114.0
    - RUN ARCH=$(uname -m) && if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; elif [ "$ARCH" = "aarch64" ]; then ARCH="arm64"; fi && curl -sSfL https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_${ARCH}.tar.gz | tar xz -C /usr/local/bin syft
    - RUN ARCH=$(uname -m) && if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; elif [ "$ARCH" = "aarch64" ]; then ARCH="arm64"; fi && curl -sSfL https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_${ARCH}.tar.gz | tar xz -C /usr/local/bin grype
    - RUN microdnf install -y python3 rsync && microdnf clean all
  append_final:
    - RUN syft version
    - RUN grype version
    - RUN grype db update
